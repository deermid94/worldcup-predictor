name: Sync World Cup fixtures & scores

# Runs automatically every 2 hours, plus a manual "Run workflow" button.
# (A sparser schedule is throttled less aggressively by GitHub than */15.)
on:
  schedule:
    - cron: '0 */2 * * *'       # top of every 2nd hour (UTC). GitHub may still skip overnight.
  workflow_dispatch:            # lets you trigger it by hand from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Pull fixtures & scores into Supabase
        env:
          FOOTBALL_DATA_KEY:    ${{ secrets.FOOTBALL_DATA_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/sync.mjs
