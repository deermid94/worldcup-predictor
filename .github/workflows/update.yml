name: Sync World Cup fixtures & scores

# Runs automatically every hour (bumped up for the knockout stage), plus a
# manual "Run workflow" button. Hourly (24/day) is still light enough that
# GitHub doesn't throttle it the way it did the old */15 schedule (96/day).
# The :17 offset avoids the top-of-hour congestion where GitHub delays/skips most.
on:
  schedule:
    - cron: '17 * * * *'        # 17 minutes past every hour (UTC)
  workflow_dispatch:            # lets you trigger it by hand from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Pull fixtures & scores into Supabase
        env:
          FOOTBALL_DATA_KEY:    ${{ secrets.FOOTBALL_DATA_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/sync.mjs
